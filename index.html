<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEPA Spring 2026 Potluck</title>
  <style>
    :root {
      --bg1: #fff3e6;
      --bg2: #ffe3ec;
      --card: rgba(255,255,255,0.86);
      --text: #22223b;
      --accent1: #ff7b54;
      --accent2: #ff4d6d;
      --accent3: #6a4c93;
      --accent4: #2a9d8f;
      --shadow: 0 14px 40px rgba(106, 76, 147, 0.18);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff8cc 0%, transparent 32%),
        radial-gradient(circle at top right, #ffd6e7 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .container {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255,123,84,0.95), rgba(255,77,109,0.92));
      color: white;
      border-radius: 30px;
      padding: 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "🌸 🍲 🥗 🍰 🥤 🍕";
      position: absolute;
      right: 18px;
      top: 18px;
      font-size: 1.4rem;
      opacity: 0.35;
      letter-spacing: 8px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      font-size: 1.05rem;
      opacity: 0.96;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.02fr 1.1fr;
      gap: 22px;
      margin-top: 22px;
      align-items: start;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--accent3);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-weight: 800;
      font-size: 0.95rem;
    }

    input, select, textarea {
      width: 100%;
      border: 2px solid #f5d5e0;
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 0.98rem;
      outline: none;
      background: rgba(255,255,255,0.95);
      transition: 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.12);
    }

    textarea { min-height: 92px; resize: vertical; }

    .upload-box {
      border: 2px dashed #f2a6b3;
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,0.7);
    }

    .preview {
      margin-top: 12px;
      display: none;
      max-width: 100%;
      max-height: 180px;
      border-radius: 16px;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 0.98rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .primary {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      box-shadow: 0 10px 24px rgba(255,77,109,0.22);
    }

    .secondary {
      background: #fff;
      color: var(--accent3);
      border: 2px solid #edd8ff;
    }

    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      border-radius: 18px;
      padding: 16px;
      color: white;
      font-weight: 800;
    }

    .stat:nth-child(1) { background: linear-gradient(135deg, #ff7b54, #ff9770); }
    .stat:nth-child(2) { background: linear-gradient(135deg, #6a4c93, #8b5fbf); }
    .stat:nth-child(3) { background: linear-gradient(135deg, #2a9d8f, #4cc9b0); }

    .stat .num {
      display: block;
      font-size: 1.8rem;
      line-height: 1;
      margin-bottom: 6px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-chip {
      padding: 10px 14px;
      border-radius: 999px;
      border: 2px solid #edd8ff;
      background: white;
      font-weight: 800;
      cursor: pointer;
      color: var(--accent3);
    }

    .filter-chip.active {
      background: var(--accent3);
      color: white;
      border-color: var(--accent3);
    }

    .feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 16px;
    }

    .entry {
      background: white;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #f1e4f8;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }

    .entry-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, #ffe5ec, #fff2c6);
      display: block;
    }

    .entry-body {
      padding: 16px;
    }

    .delete-btn {
      margin-top: 10px;
      background: #ffe5ec;
      color: #c1121f;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #ffccd5;
    }

    .tag {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 900;
      border-radius: 999px;
      padding: 7px 10px;
      margin-bottom: 10px;
      color: white;
      background: linear-gradient(135deg, var(--accent4), #55c1b3);
    }

    .entry h3 {
      margin: 0 0 6px;
      font-size: 1.12rem;
      line-height: 1.15;
    }

    .meta {
      color: #6b7280;
      font-size: 0.93rem;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .notes {
      margin: 0;
      color: #444;
      line-height: 1.45;
      font-size: 0.94rem;
    }

    .empty {
      text-align: center;
      padding: 28px 16px;
      font-weight: 700;
      color: #6b7280;
      background: rgba(255,255,255,0.72);
      border: 2px dashed #ead7f5;
      border-radius: 20px;
    }

    .footer-note {
      margin-top: 16px;
      color: #6b7280;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .success, .error {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 700;
      display: none;
    }

    .success { background: #e8fff3; color: #0f7a4f; }
    .error { background: #fff0f3; color: #c1121f; }

    @media (max-width: 900px) {
      .top-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .container { width: min(100% - 18px, 100%); }
      .hero, .card { padding: 18px; }
      .mini-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>🌸 DEPA Spring 2026 Potluck 🍲</h1>
      
    </section>

    <section class="top-grid">
      <div class="card">
        <h2>✨ Bring Something Fun</h2>
        <form id="potluckForm">
          <div class="form-grid">
            <div class="field">
              <label for="name">Your Name</label>
              <input id="name" name="name" type="text" placeholder="e.g., Rezoan Sultan" required />
            </div>

            <div class="field">
              <label for="designation">Designation</label>
              <input id="designation" name="designation" type="text" placeholder="e.g., PhD Student" required />
            </div>

            <div class="field">
              <label for="category">What are you bringing?</label>
              <select id="category" name="category" required>
                <option value="">Select one</option>
                <option>Main Dish</option>
                <option>Side Dish</option>
                <option>Dessert</option>
                <option>Drinks</option>
                <option>Snacks</option>
                <option>Utensils</option>
                <option>Other</option>
              </select>
            </div>

            <div class="field">
              <label for="item">Food / Item Name</label>
              <input id="item" name="item" type="text" placeholder="e.g., Chicken Biryani, Brownies, Plates" required />
            </div>

            <div class="field full">
              <label for="notes">Optional Notes</label>
              <textarea id="notes" name="notes" placeholder="Anything others should know? e.g., homemade, spicy, vegetarian, 20 plates, etc."></textarea>
            </div>

            <div class="field full">
              <label>Optional Picture</label>
              <div class="upload-box">
                <input id="photo" name="photo" type="file" accept="image/*" />
                <img id="preview" class="preview" alt="Preview" />
              </div>
            </div>
          </div>

          <div class="btn-row">
            <button class="primary" type="submit" id="submitBtn">🎉 Submit to Potluck Board</button>
            <button class="secondary" type="button" id="clearBtn">Reset</button>
          </div>

          <div class="success" id="successMsg">Added to the potluck board successfully 🎊</div>
          <div class="error" id="errorMsg">Something went wrong. Please check your setup and try again.</div>
        </form>

        
      </div>

      <div class="card">
        <h2>🎊 Live Potluck Board</h2>

        <div class="mini-stats">
          <div class="stat"><span class="num" id="totalCount">0</span>Total Items</div>
          <div class="stat"><span class="num" id="foodCount">0</span>Food & Drinks</div>
          <div class="stat"><span class="num" id="utensilCount">0</span>Utensils</div>
        </div>

        <div class="filters" id="filters">
          <button class="filter-chip active" data-filter="All">All</button>
          <button class="filter-chip" data-filter="Main Dish">Main Dish</button>
          <button class="filter-chip" data-filter="Dessert">Dessert</button>
          <button class="filter-chip" data-filter="Drinks">Drinks</button>
          <button class="filter-chip" data-filter="Utensils">Utensils</button>
        </div>

        <div id="feed" class="feed"></div>
        <div id="emptyState" class="empty">No submissions yet. Be the first to make the potluck board exciting 🌟</div>
      </div>
    </section>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // ==============================
    // 1) PASTE YOUR SUPABASE INFO
    // ==============================
    const SUPABASE_URL = 'https://vztlfahlezvwgqejcxia.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6dGxmYWhsZXp2d2dxZWpjeGlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzI5NzMsImV4cCI6MjA5MDE0ODk3M30.V78o5v47V71xN3ZGvYvxAGjgSNduij9HqJRbI3yPg3k'
    const BUCKET_NAME = 'potluck-images';
    const TABLE_NAME = 'potluck_items';

    // ==============================
    // 2) BASIC SETUP
    // ==============================
    const form = document.getElementById('potluckForm');
    const photoInput = document.getElementById('photo');
    const preview = document.getElementById('preview');
    const feed = document.getElementById('feed');
    const emptyState = document.getElementById('emptyState');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const totalCount = document.getElementById('totalCount');
    const foodCount = document.getElementById('foodCount');
    const utensilCount = document.getElementById('utensilCount');
    const clearBtn = document.getElementById('clearBtn');
    const filterButtons = [...document.querySelectorAll('.filter-chip')];

    let activeFilter = 'All';
    let allItems = [];

    const supabaseConfigured =
      SUPABASE_URL &&
      SUPABASE_ANON_KEY &&
      !SUPABASE_URL.includes('PASTE_YOUR') &&
      !SUPABASE_ANON_KEY.includes('PASTE_YOUR');

    const supabase = supabaseConfigured
      ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    function showMessage(type, text) {
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';
      if (type === 'success') {
        successMsg.textContent = text;
        successMsg.style.display = 'block';
      } else if (type === 'error') {
        errorMsg.textContent = text;
        errorMsg.style.display = 'block';
      }
    }

    function escapeHtml(str = '') {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getPlaceholder(category) {
      const emojiMap = {
        'Main Dish': '🍛',
        'Side Dish': '🥗',
        'Dessert': '🍰',
        'Drinks': '🥤',
        'Snacks': '🍿',
        'Utensils': '🍴',
        'Other': '🎉'
      };
      const emoji = emojiMap[category] || '🍽️';
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="800" height="500">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop stop-color="#ffe5ec" offset="0%"/>
              <stop stop-color="#fff2c6" offset="100%"/>
            </linearGradient>
          </defs>
          <rect width="100%" height="100%" fill="url(#g)"/>
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="88">${emoji}</text>
          <text x="50%" y="67%" dominant-baseline="middle" text-anchor="middle" font-size="28" font-family="Arial" fill="#6a4c93">DEPA Potluck</text>
        </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function renderItems() {
      const filtered = activeFilter === 'All'
        ? allItems
        : allItems.filter(item => item.category === activeFilter);

      feed.innerHTML = '';

      if (!filtered.length) {
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
      }

      filtered.forEach(item => {
        const image = item.image_url || getPlaceholder(item.category);
        const notes = item.notes ? `<p class="notes">${escapeHtml(item.notes)}</p>` : '<p class="notes">No extra notes.</p>';

        const card = document.createElement('article');
        card.className = 'entry';
        card.innerHTML = `
          <img class="entry-image" src="${image}" alt="${escapeHtml(item.item_name)}" />
          <div class="entry-body">
            <div class="tag">${escapeHtml(item.category)}</div>
            <h3>${escapeHtml(item.item_name)}</h3>
            <div class="meta">${escapeHtml(item.name)} • ${escapeHtml(item.designation)}</div>
            ${notes}
            <button class="delete-btn" data-id="${item.id}">🗑️ Delete</button>
          </div>
        `;
        feed.appendChild(card);

        const deleteBtn = card.querySelector('.delete-btn');
        deleteBtn.addEventListener('click', async () => {
          if (!confirm('Delete this item?')) return;
          const { error } = await supabase.from(TABLE_NAME).delete().eq('id', item.id);
          if (error) {
            alert('Delete failed');
            return;
          }
          fetchItems();
        });
      });

      totalCount.textContent = allItems.length;
      foodCount.textContent = allItems.filter(i => i.category !== 'Utensils').length;
      utensilCount.textContent = allItems.filter(i => i.category === 'Utensils').length;
    }

    async function fetchItems() {
      if (!supabase) {
        allItems = [];
        renderItems();
        return;
      }

      const { data, error } = await supabase
        .from(TABLE_NAME)
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        showMessage('error', 'Could not load the live potluck board.');
        return;
      }

      allItems = data || [];
      renderItems();
    }

    async function uploadImage(file) {
      if (!file || !supabase) return null;

      const extension = file.name.split('.').pop();
      const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${extension}`;
      const filePath = `uploads/${fileName}`;

      const { error: uploadError } = await supabase.storage
        .from(BUCKET_NAME)
        .upload(filePath, file, { upsert: false });

      if (uploadError) throw uploadError;

      const { data } = supabase.storage.from(BUCKET_NAME).getPublicUrl(filePath);
      return data.publicUrl;
    }

    photoInput.addEventListener('change', () => {
      const file = photoInput.files?.[0];
      if (!file) {
        preview.style.display = 'none';
        preview.src = '';
        return;
      }
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
    });

    clearBtn.addEventListener('click', () => {
      form.reset();
      preview.style.display = 'none';
      preview.src = '';
      showMessage();
    });

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderItems();
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      showMessage();

      if (!supabase) {
        showMessage('error', 'Supabase is not connected yet. Paste your URL and anon key first.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const formData = new FormData(form);
        const file = photoInput.files?.[0] || null;
        let imageUrl = null;

        if (file) {
          imageUrl = await uploadImage(file);
        }

        const payload = {
          name: formData.get('name')?.toString().trim(),
          designation: formData.get('designation')?.toString().trim(),
          category: formData.get('category')?.toString().trim(),
          item_name: formData.get('item')?.toString().trim(),
          notes: formData.get('notes')?.toString().trim() || null,
          image_url: imageUrl
        };

        const { error } = await supabase.from(TABLE_NAME).insert([payload]);
        if (error) throw error;

        form.reset();
        preview.style.display = 'none';
        preview.src = '';
        showMessage('success', 'Added to the potluck board successfully 🎊');
        await fetchItems();
      } catch (err) {
        console.error(err);
        showMessage('error', err.message || 'Something went wrong while submitting.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '🎉 Submit to Potluck Board';
      }
    });

    // Initial load
    fetchItems();
  </script>
</body>
</html>
